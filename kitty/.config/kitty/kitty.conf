## General
macos_option_as_alt yes
background_opacity 0.80
dynamic_background_opacity yes
background_blur 20
cursor_blink_interval 1

cursor_trail 1

## Font
font_size 16.0
disable_ligatures never
font_family      family='CaskaydiaCove Nerd Font Mono' style=Light
bold_font        auto
italic_font      auto
bold_italic_font auto

modify_font underline_position 3
modify_font underline_thickness 150%

## Tab bar
tab_bar_align left
tab_bar_edge top
tab_bar_style powerline

remember_window_size  yes
initial_window_width  1500
initial_window_height 800

## symbol_map
# symbol_map U+EAD3,U+DB81-U+DE33 Symbols Nerd Font
# Nerd Fonts v3.3.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

## kitty-scrollback
allow_remote_control socket
listen_on unix:/tmp/kitty
shell_integration enabled

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten /Users/ackerr/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output

## Color
# Kanagawa
background #1F1F28
foreground #DCD7BA
selection_background #2D4F67
selection_foreground #C8C093
url_color #72A7BC
cursor none

# tabs
active_tab_background #2D4F67
active_tab_foreground #DCD7BA
inactive_tab_background #223249
inactive_tab_foreground #727169
# tab_bar_background #15161E

# normal
color0 #090618
color1 #C34043
color2 #76946A
color3 #C0A36E
color4 #7E9CD8
color5 #957FB8
color6 #6A9589
color7 #C8C093

# bright
color8  #727169
color9  #E82424
color10 #98BB6C
color11 #E6C384
color12 #7FB4CA
color13 #938AA9
color14 #7AA89F
color15 #DCD7BA

# extended colors
color16 #FFA066
color17 #FF5D62

## Keymap
# Window management
enabled_layouts splits

# Window borders and spacing
window_border_width 1.5pt
window_margin_width 2
window_padding_width 2
active_border_color #7E9CD8
inactive_border_color #54546D
draw_minimal_borders yes

map super+d launch --location=vsplit
map super+shift+d launch --location=hsplit
map super+w close_window
map super+[ previous_window
map super+] next_window

# Tab management
map super+t       new_tab
map super+shift+w close_tab
map super+shift+[ previous_tab
map super+shift+] next_tab

# other
map super+,       edit_config_file
map super+enter   toggle_maximized
map super+u       kitten toggle_background_opacity.py


map super+f launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i
